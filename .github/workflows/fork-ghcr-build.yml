name: Fork GHCR Build

# Per-branch GHCR build for t0saki's fork.
# Lives only on the fork (main of t0saki/OpenViking diverges from
# volcengine/OpenViking by this file alone). The `if:` guard makes this
# workflow a no-op if it ever lands in upstream.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: fork-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: github.repository == 't0saki/OpenViking'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Normalize image name
        id: image
        env:
          RAW: ${{ github.repository }}
        run: |
          echo "name=$(echo "$RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA + branch slug
        id: refs
        run: |
          short_sha="${GITHUB_SHA::7}"
          # Slugify branch: lowercase, replace non-alphanumerics with '-'
          slug=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "version=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (per-arch digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            OPENVIKING_VERSION=${{ steps.refs.outputs.version }}
          cache-from: type=gha,scope=fork-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=fork-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${{ steps.build.outputs.digest }}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: fork-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    if: github.repository == 't0saki/OpenViking'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Normalize image name
        id: image
        env:
          RAW: ${{ github.repository }}
        run: |
          echo "name=$(echo "$RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: refs
        run: |
          short_sha="${GITHUB_SHA::7}"
          slug=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: fork-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          refs=()
          for f in /tmp/digests/sha256:*; do
            [ -e "$f" ] || continue
            digest=$(basename "$f")
            refs+=("${image}@${digest}")
          done
          [ ${#refs[@]} -gt 0 ] || { echo "no digests"; exit 1; }
          docker buildx imagetools create \
            --tag "${image}:${{ steps.refs.outputs.slug }}" \
            --tag "${image}:${{ steps.refs.outputs.sha_tag }}" \
            "${refs[@]}"
