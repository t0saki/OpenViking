name: Fork GHCR Build

# Per-branch GHCR build for t0saki's fork.
# Lives only on the fork (main of t0saki/OpenViking diverges from
# volcengine/OpenViking by this file alone). The `if:` guard makes this
# workflow a no-op if it ever lands in upstream.
#
# Triggers:
# - Auto: push to any branch that has this file in its tree
# - Manual: `gh workflow run "Fork GHCR Build" --ref main -f target_ref=<branch>`
#   Dispatches always read THIS file from --ref (which must be main), but the
#   build itself checks out and builds `target_ref`. This is how feature
#   branches without the workflow file get built without polluting their diff.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or tag to check out and build (empty = current ref)"
        required: false
        type: string
        default: ""

concurrency:
  group: fork-ghcr-${{ inputs.target_ref || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: github.repository == 't0saki/OpenViking'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve target ref
        id: ref
        run: |
          target="${{ inputs.target_ref }}"
          if [ -z "$target" ]; then
            target="${GITHUB_REF_NAME}"
          fi
          echo "name=${target}" >> "$GITHUB_OUTPUT"

      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.name }}
          fetch-depth: 0
          submodules: recursive

      - name: Normalize image name
        id: image
        env:
          RAW: ${{ github.repository }}
        run: |
          echo "name=$(echo "$RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute version + tags
        id: tags
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          # Docker tag slug: lowercase, hyphens allowed
          tag_slug=$(echo "${{ steps.ref.outputs.name }}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          # PEP 440 local-version slug: lowercase, dots only (no hyphens / slashes inside local segment)
          pep_slug=$(echo "${{ steps.ref.outputs.name }}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9]#.#g')
          {
            echo "short_sha=${short_sha}"
            echo "tag_slug=${tag_slug}"
            echo "sha_tag=${tag_slug}-${short_sha}"
            echo "version=0.0.0+${pep_slug}.${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (per-arch digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            OPENVIKING_VERSION=${{ steps.tags.outputs.version }}
          cache-from: type=gha,scope=fork-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=fork-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${{ steps.build.outputs.digest }}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: fork-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    if: github.repository == 't0saki/OpenViking'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve target ref
        id: ref
        run: |
          target="${{ inputs.target_ref }}"
          if [ -z "$target" ]; then
            target="${GITHUB_REF_NAME}"
          fi
          echo "name=${target}" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: image
        env:
          RAW: ${{ github.repository }}
        run: |
          echo "name=$(echo "$RAW" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Checkout for SHA resolution
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.name }}
          fetch-depth: 1

      - name: Compute tags
        id: tags
        run: |
          short_sha=$(git rev-parse --short=7 HEAD)
          tag_slug=$(echo "${{ steps.ref.outputs.name }}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          {
            echo "tag_slug=${tag_slug}"
            echo "sha_tag=${tag_slug}-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: fork-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          image="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          refs=()
          for f in /tmp/digests/sha256:*; do
            [ -e "$f" ] || continue
            digest=$(basename "$f")
            refs+=("${image}@${digest}")
          done
          [ ${#refs[@]} -gt 0 ] || { echo "no digests"; exit 1; }
          docker buildx imagetools create \
            --tag "${image}:${{ steps.tags.outputs.tag_slug }}" \
            --tag "${image}:${{ steps.tags.outputs.sha_tag }}" \
            "${refs[@]}"
